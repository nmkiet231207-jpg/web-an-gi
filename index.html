<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiên Tri Đồ Ăn</title>
    <style>
        /* CẤU TRÚC CSS CƠ BẢN */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            transition: background-color 0.3s;
            text-align: center;
            overflow: hidden; /* Chống cuộn chuột khi jumpscare hiện ra */
        }
        #food-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px;
            color: #333;
            min-height: 50px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
            position: relative;
            z-index: 1; /* Đảm bảo nút nằm trên nền */
        }
        button:hover {
            background-color: #45a049;
        }

        /* --- PHẦN KÍCH HOẠT JUMPSCARE (SẼ HIỆN RA KHI WEB "NỔI CÁU") --- */
        #scare-container {
            display: none; /* Mặc định bị ẩn đi */
            position: fixed; /* Phủ kín toàn bộ màn hình */
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black; /* Nền đen tịt dramatic */
            z-index: 999; /* Nằm trên cùng của tất cả mọi thứ */
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        #scare-image {
            max-width: 90%; /* Ảnh to nhưng không bị tràn màn hình */
            max-height: 70vh;
            border: 5px solid yellow; /* Thêm cái viền cho máu chiến */
            object-fit: contain;
        }
        #scare-text {
            color: yellow;
            font-size: 4rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 4px red; /* Thêm hiệu ứng bóng đỏ cho ghê */
        }

        /* Khi body có class 'angry', các thành phần cũ sẽ bị ẩn đi */
        body.angry h1, body.angry #food-display, body.angry button {
            display: none !important;
        }
        /* Và container jumpscare sẽ hiện ra */
        body.angry #scare-container {
            display: flex;
            animation: zoomIn 0.1s ease-in; /* Hiệu ứng ảnh bật ra bất ngờ */
        }

        /* Hiệu ứng ảnh phóng to bất thình lình */
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Chuyên Gia Dinh Dưỡng Giải Quyết Minh Kiệt</h1>
    <div id="food-display">Nhấn nút bên dưới để nhận thông điệp vũ trụ!</div>
    <button id="random-btn">Hôm nay ăn gì?</button>

    <div id="scare-container">
        <img id="scare-image" src="" alt="JUMPSCARE">
        <div id="scare-text">NẤU MỲ TÔM MÀ ĂN ĐI, HỎI NHIỀU QUÁ!!!</div>
    </div>

    <script>
        // Menu đồ ăn xịn xò của bạn (đã thêm dấu phẩy đầy đủ)
        const menu = [
            "Cơm rang dưa bò",
            "Phở bò", 
            "Bún bò", 
            "Cơm gà", 
            "Bún trộn",
            "Mỳ cay",
            "Nem nướng",
            "Bánh giò + Tào phớ", 
            "Bún đậu mắm tôm",
            "Cơm MaiLuot",
            "Bánh mỳ",
            "Bún chả",
            "Bánh cuốn"
        ];

        let clickCount = 0; 
        let lastIndex = -1; 

        const foodDisplay = document.getElementById('food-display');
        const button = document.getElementById('random-btn');
        const scareImage = document.getElementById('scare-image');

        button.addEventListener('click', function() {
            clickCount++;

            if (clickCount <= 3) {
                let randomIndex = Math.floor(Math.random() * menu.length);
                while (randomIndex === lastIndex) {
                    randomIndex = Math.floor(Math.random() * menu.length);
                }
                lastIndex = randomIndex;
                foodDisplay.innerText = menu[randomIndex];
                
                if (clickCount === 1) {
                    button.innerText = "Không thích? Đổi món khác";
                } else if (clickCount === 2) {
                    button.innerText = "Hơi kén cá chọn canh rồi đấy, bấm phát nữa xem?";
                    button.style.backgroundColor = "#ff9800";
                } else if (clickCount === 3) {
                    button.innerText = "Cảnh báo chót";
                    button.style.backgroundColor = "darkred";
                }
            } else {
                // --- KÍCH HOẠT CHẾ ĐỘ JUMPSCARE KHI BẤM ĐẾN LẦN THỨ 4 ---
                document.body.classList.add('angry'); // Gọi CSS để phủ màn hình đen
                
                // BẠN CẦN PASTE ĐƯỜNG LINK ẢNH MẶC NGƯỜI NỔI TIẾNG VÀO GIỮA DẤU NHÁY ĐƠN Ở DÒNG DƯỚI
                // Ví dụ: scareImage.src = 'https://kenh14cdn.com/203336854389633024/2021/8/13/-16288452393801288406942.jpg';
                scareImage.src = ''; 
            }
        });
    </script>
</body>
</html>
